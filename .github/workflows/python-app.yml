# This workflow will install Python dependencies, run tests and lint with a single version of Python
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: Release on Windows

on:
  push:
    tags:
      - 'v*'            # 当推送以 'v' 开头的标签时触发（如 v1.0.0）
  workflow_dispatch:    # 同时也支持手动触发（便于测试）

jobs:
  build:
    runs-on: windows-latest   # 使用 Windows 运行器

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'   # 根据你的项目选择合适的版本

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt   # 确保你的依赖都写在这里
          pip install pyinstaller            # 安装打包工具

      - name: Build executable using script
        run: |
          powershell -File script/build_exe.ps1
        # 脚本应在当前目录下的 script/ 中，执行后生成 dist 目录

      - name: Package dist folder as zip
        run: |
          Compress-Archive -Path dist\* -DestinationPath formula_recognition.zip

      - name: Upload zip to Release
        uses: softprops/action-gh-release@v1
        with:
          files: formula_recognition.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
