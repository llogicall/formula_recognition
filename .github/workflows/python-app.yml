name: Release on Windows

on:
  push:
    tags:
      - '*'                 
  workflow_dispatch:        
    inputs:
      tag:
        description: 'Release tag (e.g., 1.0.0 或 v1.0.0)'
        required: true
        default: 'v1.0.0'
        type: string

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5     
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Debug tag info
        run: |
          echo "github.ref: ${{ github.ref }}"
          echo "github.ref_name: ${{ github.ref_name }}"
          echo "github.ref_type: ${{ github.ref_type }}"
          echo "inputs.tag: ${{ inputs.tag }}"
        shell: bash

      - name: Build executable using script
        run: |
          # 调试：确认脚本存在
          if (Test-Path "scripts/build_exe.ps1") {
            Write-Host "Script found."
          } else {
            Write-Host "Script NOT found. Listing scripts directory:"
            Get-ChildItem scripts -ErrorAction SilentlyContinue
            exit 1
          }
          powershell -File scripts/build_exe.ps1
        shell: powershell

      - name: Package dist folder as zip
        run: |
          Compress-Archive -Path dist\* -DestinationPath formula_recognition.zip

      - name: Upload zip to Release
        uses: softprops/action-gh-release@v2   # 使用有效版本
        with:
          tag_name: ${{ github.ref_name }}     # 显式传递标签名
          files: formula_recognition.zip
          overwrite: true                      # 允许覆盖已存在的 Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

